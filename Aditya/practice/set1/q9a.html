<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q9(A) - Basic Calculator</title>
    <style>
        body {
            background: #f1f5f9;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .calc-card {
            background: white;
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 320px;
        }

        h2 { text-align: center; color: #1e293b; margin-bottom: 1.5rem; }

        input {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: #3b82f6; }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        button {
            padding: 0.8rem;
            border: none;
            border-radius: 12px;
            background: #3b82f6;
            color: white;
            font-weight: 600;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { background: #2563eb; transform: scale(1.05); }

        #result {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 1.25rem;
            font-weight: 700;
            color: #1e293b;
            min-height: 1.5em;
        }
    </style>
</head>
<body>
    <div class="calc-card">
        <h2>Calculator</h2>
        <input type="number" id="num1" placeholder="First Number">
        <input type="number" id="num2" placeholder="Second Number">
        
        <div class="btn-grid">
            <button onclick="calc('+')">+</button>
            <button onclick="calc('-')">-</button>
            <button onclick="calc('*')">×</button>
            <button onclick="calc('/')">÷</button>
        </div>

        <div id="result">Result: --</div>
    </div>

    <script>
        function calc(op) {
            const n1 = parseFloat(document.getElementById('num1').value);
            const n2 = parseFloat(document.getElementById('num2').value);
            let res = 0;

            if (isNaN(n1) || isNaN(n2)) {
                alert("Please enter both numbers");
                return;
            }

            switch(op) {
                case '+': res = n1 + n2; break;
                case '-': res = n1 - n2; break;
                case '*': res = n1 * n2; break;
                case '/': 
                    if (n2 === 0) {
                        alert("Cannot divide by zero");
                        return;
                    }
                    res = n1 / n2; 
                    break;
            }

            document.getElementById('result').innerText = `Result: ${res}`;
        }
    </script>
</body>
</html>
