<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set 2 Q1(1) - Change Image</title>
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
        }

        .image-frame {
            width: 400px;
            height: 400px;
            border: 2px solid #333;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255,255,255,0.1);
            margin-bottom: 2rem;
            background: #111;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.5s ease;
        }

        button {
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="image-frame">
            <img src="img1.png" alt="Display Image" id="mainImg">
        </div>
        <button id="changeBtn">Change Image</button>
    </div>

    <script>
        const img = document.getElementById('mainImg');
        const btn = document.getElementById('changeBtn');
        let isFirst = true;

        btn.addEventListener('click', () => {
            img.style.opacity = '0';
            setTimeout(() => {
                if (isFirst) {
                    img.src = 'img2.png';
                } else {
                    img.src = 'img1.png';
                }
                img.style.opacity = '1';
                isFirst = !isFirst;
            }, 500);
        });
    </script>
</body>
</html>
