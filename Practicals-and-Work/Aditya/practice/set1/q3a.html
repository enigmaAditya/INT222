<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q3(A) - DateTime & Reset</title>
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #000;
            color: #fff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .container {
            text-align: center;
            background: #111;
            padding: 3rem;
            border-radius: 40px;
            border: 1px solid #333;
            box-shadow: 0 0 50px rgba(0, 112, 243, 0.2);
        }

        input {
            width: 300px;
            padding: 1.2rem;
            border-radius: 12px;
            border: 2px solid #333;
            background: #000;
            color: #00f2fe;
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 2rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #0070f3;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        button {
            padding: 1rem 2rem;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        #dateBtn {
            background: linear-gradient(90deg, #0070f3, #00dfd8);
            color: white;
        }

        #resetBtn {
            background: #333;
            color: #999;
        }

        button:hover {
            opacity: 0.9;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <input type="text" id="display" readonly placeholder="Date and Time will appear here">
        <div class="btn-group">
            <button id="dateBtn">Date Time</button>
            <button id="resetBtn">Reset</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        
        document.getElementById('dateBtn').addEventListener('click', () => {
            display.value = new Date().toLocaleString();
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            display.value = '';
        });
    </script>
</body>
</html>
