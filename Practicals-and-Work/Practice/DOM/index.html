<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS with Aditya</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="first">first div</div>
    <h1 id="heading1">DOM Demo by Aditya</h1>
    <h2 id="heading2">JavaScript</h2>
    <h4>Topic1: Starter code</h4>
    <p>Let's learn about DOM concepts in details.</p>
    <p>Paragraph  2</p>
    <button> Click me!</button>
    <main>
        <div class="main-section">
            <aside>
                <h3>Address</h3>
                <p>123 Main St</p>
                <p>Anytown, USA</p>
                <p>12345</p>
                <button>Show</button>
            </aside>
            <form>
                <fieldset>
                    <legend>Welcome Form</legend>
                    <label for="name">Enter Your Name: </label>
                    <input type="text" id="name" required placeholder="e.g. Aditya"><br>
                    <label for="options">Enter your fav colour</label>
                    <select id="options">
                        <option value="" selected disabled>Colours</option>
                        <option value="red">Red</option>
                        <option value="blue">Blue</option>
                        <option value="orange">Orange</option>
                        <option value="purple">Purple</option>
                        <option value="green">Green</option>
                        <option value="yellow">Yellow</option>
                    </select><br>
                    <label for="textarea">Write your Message: </label><br>
                    <textarea id ="textarea" width="100 px" height="100px" placeholder="aditya"></textarea><br>
                    <button type="submit">Submit</button>
                </fieldset>
            </form>
        </div>
    </main>
    
    <script src="first.js"></script>
</body>
</html>
