<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Delegation & Debugging</title>
    <style>
        body { font-family: sans-serif; padding: 50px; text-align: center; }
        #button-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 100px); 
            gap: 10px; 
            justify-content: center; 
            margin-top: 20px;
            padding: 20px;
            background: #eee;
        }
        .grid-btn { padding: 20px; border: 1px solid #ccc; cursor: pointer; background: white; }
        .grid-btn:hover { background: #ddd; }
        #log { margin-top: 20px; color: #666; font-family: monospace; }
    </style>
</head>
<body>
    <h2>Event Delegation Demo</h2>
    <p>We have one event listener on the grid container instead of individual buttons.</p>
    
    <div id="button-grid">
        <div class="grid-btn" data-id="1">1</div>
        <div class="grid-btn" data-id="2">2</div>
        <div class="grid-btn" data-id="3">3</div>
        <div class="grid-btn" data-id="4">4</div>
        <div class="grid-btn" data-id="5">5</div>
        <div class="grid-btn" data-id="6">6</div>
    </div>

    <button id="addMore" style="margin-top: 20px;">Add More Buttons Dynamically</button>

    <div id="log">Click a button to see the log...</div>

    <script>
        const grid = document.getElementById('button-grid');
        const log = document.getElementById('log');
        const addBtn = document.getElementById('addMore');

        // EVENT DELEGATION
        // Attach listener to PARENT (grid)
        grid.addEventListener('click', (event) => {
            // Debugging tip: console.log(event.target)
            // Check if the clicked element is what we want
            if (event.target.classList.contains('grid-btn')) {
                const id = event.target.getAttribute('data-id');
                log.textContent = `Button ${id} clicked! (Delegated)`;
                
                // Debugging: Set a breakpoint here in DevTools
                console.log("Clicked Element:", event.target);
            }
        });

        // Adding dynamic elements
        let count = 6;
        addBtn.addEventListener('click', () => {
            count++;
            const newBtn = document.createElement('div');
            newBtn.className = 'grid-btn';
            newBtn.setAttribute('data-id', count);
            newBtn.textContent = count;
            grid.appendChild(newBtn);
            
            // Note: We don't need to add a click listener to 'newBtn' 
            // because the parent listener handles it!
        });

        console.info("Practical 11 Loaded. Use F12 -> Sources to debug this script.");
    </script>
</body>
</html>
