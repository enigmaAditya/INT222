<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Manipulation</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fdfdfd; padding: 40px; }
        #task-container { max-width: 400px; margin: auto; background: white; padding: 20px; border: 1px solid #eee; border-radius: 8px; }
        .task-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #f0f0f0; }
        .task-item:last-child { border-bottom: none; }
        .delete-btn { color: red; cursor: pointer; font-weight: bold; }
        input { padding: 8px; border: 1px solid #ddd; border-radius: 4px; width: 70%; }
        button { padding: 8px 12px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="task-container">
        <h2>Task List</h2>
        <div style="margin-bottom: 20px;">
            <input type="text" id="taskInput" placeholder="Enter new task...">
            <button id="addBtn">Add</button>
        </div>
        <ul id="taskList" style="list-style: none; padding: 0;">
            <!-- Dynamic elements will go here -->
            <li class="task-item">
                <span>Initial Task</span>
                <span class="delete-btn">X</span>
            </li>
        </ul>
    </div>

    <script>
        const input = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const taskList = document.getElementById('taskList');

        // Add element
        addBtn.addEventListener('click', () => {
            const text = input.value.trim();
            if (text === "") return;

            // Create new elements
            const li = document.createElement('li');
            li.className = 'task-item';
            
            const span = document.createElement('span');
            span.textContent = text;
            
            const del = document.createElement('span');
            del.textContent = 'X';
            del.className = 'delete-btn';
            
            // Traversal & Appending
            li.appendChild(span);
            li.appendChild(del);
            taskList.appendChild(li);

            input.value = '';

            // Update functionality
            span.addEventListener('click', () => {
                span.style.textDecoration = span.style.textDecoration === 'line-through' ? 'none' : 'line-through';
            });

            // Removal functionality
            del.addEventListener('click', () => {
                li.remove();
            });
        });

        // Demo removal for initial item
        document.querySelector('.delete-btn').addEventListener('click', (e) => {
            e.target.parentElement.remove();
        });
    </script>
</body>
</html>
