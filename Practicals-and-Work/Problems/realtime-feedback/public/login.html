<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Realtime Feedback</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); margin: 0; 
        }
        .login-box { 
            background: white; padding: 2.5rem; border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 320px; text-align: center; 
        }
        h2 { margin-top: 0; color: #333; }
        input { 
            width: calc(100% - 24px); padding: 12px; margin: 15px 0; 
            border: 2px solid #e1e1e1; border-radius: 6px; font-size: 16px; outline: none; transition: border 0.3s;
        }
        input:focus { border-color: #667eea; }
        button { 
            width: 100%; padding: 12px; background: #667eea; color: white; 
            border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; transition: background 0.3s;
        }
        button:hover { background: #5a6fe0; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>System Login</h2>
        <p style="color: #666; font-size: 14px; margin-bottom: 20px;">Enter a username to join the real-time feedback channel.</p>
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="Username" required autocomplete="off">
            <button type="submit">Connect to Channel</button>
        </form>
    </div>
</body>
</html>
