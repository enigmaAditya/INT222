<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Level Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- Login Overlay -->
    <div id="loginOverlay" class="overlay">
        <div class="glass-card login-card">
            <h2>Welcome</h2>
            <p>Enter a username to join the chat</p>
            <form id="loginForm">
                <input type="text" id="usernameInput" placeholder="Username" autocomplete="off" required maxlength="20">
                <button type="submit" class="btn-primary">Join Chat</button>
            </form>
        </div>
    </div>

    <!-- Main Chat Interface (Hidden initially) -->
    <div id="chatInterface" class="chat-container hidden">
        <div class="glass-card chat-card">
            <header class="chat-header">
                <h2>Live Chat</h2>
                <div class="online-indicator"></div>
            </header>
            
            <div id="messagesContainer" class="messages-container">
                <!-- Messages will appear here -->
            </div>
            
            <div class="typing-indicator-container">
                <span id="typingIndicator" class="hidden">Someone is typing...</span>
            </div>

            <form id="chatForm" class="chat-input-area">
                <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off" disabled>
                <button type="submit" id="sendBtn" class="btn-primary btn-send" disabled>
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </form>
        </div>
    </div>

    <!-- Load Socket.IO from server and our custom script -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
